# Agentic OS — CI
#
# Runs on every PR + push to main. Validates the OS contract:
#   - Tests pass (Tier 1 unit + Tier 2 structural — currently 568 tests)
#   - Dashboard app typechecks (no `any` drift)
#   - Markdown is Prettier-formatted (consistent docs)
#   - Vault manifest rebuilds cleanly (no entry-shape drift)
#
# Fast: full run ~60s on cold cache. Pre-commit hook (.husky/pre-commit OR
# the .claude/hooks installation) runs the same checks locally; CI is the
# fallback safety net + the gate for external contributors.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when new commits land — saves
# CI minutes on rapid pushes during interactive PR work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test + typecheck + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install dashboard deps
        working-directory: domains/meta/app
        run: npm ci

      - name: Typecheck dashboard
        working-directory: domains/meta/app
        run: npx tsc --noEmit

      - name: Build vault manifest
        # Structural tests read vault/.index/manifest.json. The manifest is
        # per-install (gitignored) so a fresh CI runner needs to build it
        # first. This step also validates that the seed entries' frontmatter
        # parses correctly — the rebuild script fails loudly on YAML errors.
        run: node .claude/hooks/rebuild-vault-index.mjs

      - name: Run test suite
        run: npm test

      - name: Markdown format check
        run: npm run md:check

      # Future: add an "audit" step that runs scripts/audit.mjs and asserts no
      # error-severity findings. Deferred until the audit's exit-code semantics
      # are stable for CI (currently it returns 0 even with errors so the
      # dashboard doesn't break on noisy local installs).
